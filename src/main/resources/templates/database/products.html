<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Baza produktów</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --surface: #16213e;
        }

        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            color: #2d3748;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary), var(--surface));
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-header .page-label {
            font-size: 0.85rem;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .section-card .card-header {
            background: #f8fafc;
            border-bottom: 1px solid #e8ecf0;
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .products-table th {
            background: #f8fafc;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #718096;
            font-weight: 600;
            border: none;
            padding: 0.85rem 1rem;
            white-space: nowrap;
        }

        .products-table td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            font-size: 0.88rem;
            border-color: #f0f4f8;
        }

        .products-table tbody tr:hover {
            background: #f8fafc;
        }

        .product-title {
            font-weight: 500;
            color: #2d3748;
        }

        .search-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            padding: 0.5rem 1rem;
            width: 280px;
        }

        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            color: white;
        }

        .badge-status {
            padding: 0.3rem 0.7rem;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .pagination .page-link {
            border-radius: 8px !important;
            margin: 0 2px;
            color: #4a5568;
            border-color: #e2e8f0;
            font-size: 0.85rem;
        }

        .pagination .page-item.active .page-link {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination .page-item.disabled .page-link {
            color: #cbd5e0;
        }

        .counter-badge {
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 0.3rem 0.9rem;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <div class="page-label">Magazyn</div>
                <h1 class="mb-0 fw-bold">Baza produktów</h1>
                <small class="opacity-50 counter-badge mt-2 d-inline-block">
                    <i class="bi bi-box-seam me-1"></i>
                    Produktów: <span th:text="${products.totalElements}">0</span>
                </small>
            </div>
            <div>
                <form th:action="@{/admin/search}" class="d-flex gap-2">
                    <input type="text" name="keywords" class="search-box"
                           placeholder="&#x1F50D; Szukaj produktu..." id="generalSearch">
                    <button type="submit" class="btn btn-light btn-sm px-3">Szukaj</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">

    <!-- MENU -->
    <div th:replace="~{database/fragments/menu :: menu}"></div>

    <div class="section-card">
        <div class="card-header">
            <i class="bi bi-table"></i> Lista produktów
        </div>
        <div class="table-responsive">
            <table class="table products-table mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Zdjęcie</th>
                    <th>EAN</th>
                    <th>Tytuł</th>
                    <th>Status</th>
                    <th>Wydawnictwo</th>
                    <th>Typ</th>
                    <th class="text-end">Cena</th>
                    <th class="text-center">VAT</th>
                    <th class="text-end">Rabat %</th>
                    <th class="text-end">Cena netto</th>
                    <th class="text-end">Cena brutto</th>
                    <th class="text-center">Stan</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products.content}">
                    <td class="text-muted" th:text="${product.id}"></td>
                    <td>
                        <img th:src="${product.img}" alt="" width="60"
                             style="border-radius:6px; object-fit:cover; height:60px;"
                             onerror="this.style.display='none'">
                    </td>
                    <td><small th:text="${product.ean}"></small></td>
                    <td>
                        <div class="product-title" th:text="${product.title}"></div>
                    </td>
                    <td>
                        <span class="badge-status bg-light text-secondary border"
                              th:text="${product.status}"></span>
                    </td>
                    <td th:text="${product.publisher}"></td>
                    <td><small th:text="${product.type}"></small></td>
                    <td class="text-end fw-semibold" th:text="${product.price}"></td>
                    <td class="text-center"><small th:text="${product.vat}"></small></td>
                    <td class="text-end" th:text="${product?.LatestOffer?.discountPercent} ?: '—'"></td>
                    <td class="text-end" th:text="${product?.LatestOffer?.wholesaleNetPrice} ?: '—'"></td>
                    <td class="text-end fw-semibold" th:text="${product?.LatestOffer?.wholesaleGrossPrice} ?: '—'"></td>
                    <td class="text-center">
                        <span th:text="${product?.LatestOffer?.stock} ?: '0'"
                              th:classappend="${(product?.LatestOffer?.stock ?: 0) > 0} ? 'text-success fw-bold' : 'text-danger'">
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGINACJA -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center flex-wrap gap-1">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(pageNumber=${currentPage > 0 ? currentPage - 1 : 0}, size=${pageSize})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage == 0} ? 'active'">
                <a class="page-link" th:href="@{/admin/products(pageNumber=0, size=${pageSize})}">1</a>
            </li>

            <li th:each="i : ${#numbers.sequence(1, totalPages - 2)}"
                th:if="${i >= currentPage - 3 and i <= currentPage + 3}"
                class="page-item"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/products(pageNumber=${i}, size=${pageSize})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:if="${totalPages > 1}"
                th:classappend="${currentPage == totalPages - 1} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/products(pageNumber=${totalPages - 1}, size=${pageSize})}"
                   th:text="${totalPages}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(pageNumber=${currentPage + 1 < totalPages ? currentPage + 1 : totalPages - 1}, size=${pageSize})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
