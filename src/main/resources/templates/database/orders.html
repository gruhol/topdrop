<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zamówienia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --surface: #16213e;
        }

        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            color: #2d3748;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary), var(--surface));
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-header .page-label {
            font-size: 0.85rem;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .section-card .card-header {
            background: #f8fafc;
            border-bottom: 1px solid #e8ecf0;
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .products-table th {
            background: #f8fafc;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #718096;
            font-weight: 600;
            border: none;
            padding: 0.85rem 1rem;
            white-space: nowrap;
        }

        .products-table td {
            padding: 0.75rem 1rem;
            vertical-align: middle;
            font-size: 0.88rem;
            border-color: #f0f4f8;
        }

        .products-table tbody tr:hover {
            background: #f8fafc;
        }

        .search-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            padding: 0.5rem 1rem;
            width: 280px;
        }

        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            color: white;
        }

        .pagination .page-link {
            border-radius: 8px !important;
            margin: 0 2px;
            color: #4a5568;
            border-color: #e2e8f0;
            font-size: 0.85rem;
        }

        .pagination .page-item.active .page-link {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination .page-item.disabled .page-link {
            color: #cbd5e0;
        }

        .counter-badge {
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 0.3rem 0.9rem;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.65rem;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .platon-to-realize  { background-color: #3182ce; }
        .platon-in-progress { background-color: #d69e2e; }
    </style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <div class="page-label">Sprzedaż</div>
                <h1 class="mb-0 fw-bold">Zamówienia</h1>
                <small class="opacity-50 counter-badge mt-2 d-inline-block">
                    <i class="bi bi-cart3 me-1"></i>
                    Zamówień: <span th:text="${orders.totalElements}">0</span>
                </small>
            </div>
            <div>
                <form th:action="@{/search}" class="d-flex gap-2">
                    <input type="text" name="keywords" class="search-box"
                           placeholder="&#x1F50D; Szukaj zamówienia..." id="generalSearch">
                    <button type="submit" class="btn btn-light btn-sm px-3">Szukaj</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5">

    <!-- MENU -->
    <div th:replace="~{database/fragments/menu :: menu}"></div>

    <div class="section-card">
        <div class="card-header">
            <i class="bi bi-table"></i> Lista zamówień
        </div>
        <div class="table-responsive">
            <table class="table products-table mb-0">
                <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Data</th>
                    <th>Klient</th>
                    <th>Status</th>
                    <th class="text-end">Wartość</th>
                    <th class="text-center">Akcja</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders.content}">
                    <td class="text-muted fw-semibold" th:text="${order.orderId}"></td>
                    <td th:text="${order.dateAdd}"></td>
                    <td>
                        <div class="fw-500" th:text="${order.userLogin}"></div>
                        <small class="text-muted" th:text="${order.phone}"></small><br>
                        <small class="text-muted" th:text="${order.email}"></small>
                    </td>
                    <td>
                        <!-- Status potwierdzenia -->
                        <div>
                            <span th:if="${order.confirmed}" class="status-badge bg-success text-white">
                                <i class="bi bi-check-circle me-1"></i>Potwierdzone
                            </span>
                            <span th:unless="${order.confirmed}" class="status-badge bg-warning text-dark">
                                <i class="bi bi-clock me-1"></i>Niepotwierdzone
                            </span>
                        </div>
                        <!-- Status Platon -->
                        <div th:if="${order.platonOrderStatus != null}" class="mt-1">
                            <span th:with="s=${order.platonOrderStatus}"
                                  th:class="${s == 'To accounting'} ? 'status-badge bg-secondary text-white'
                                          : (${s == 'To realize'}   ? 'status-badge platon-to-realize text-white'
                                          : (${s == 'In progress'}  ? 'status-badge platon-in-progress text-white'
                                          : (${s == 'Canceled'}     ? 'status-badge bg-danger text-white'
                                          : (${s == 'Closed'}       ? 'status-badge bg-success text-white'
                                          :                           'status-badge bg-light text-dark'))))">
                                <i th:class="${order.platonOrderStatus == 'To accounting'} ? 'bi bi-hourglass-split me-1'
                                            : (${order.platonOrderStatus == 'To realize'}  ? 'bi bi-check2-circle me-1'
                                            : (${order.platonOrderStatus == 'In progress'} ? 'bi bi-gear me-1'
                                            : (${order.platonOrderStatus == 'Canceled'}    ? 'bi bi-x-circle me-1'
                                            : (${order.platonOrderStatus == 'Closed'}      ? 'bi bi-bag-check me-1'
                                            :                                                'bi bi-cloud me-1'))))"></i>
                                Platon:
                                <span th:switch="${order.platonOrderStatus}">
                                    <span th:case="'To accounting'">Przyjęte</span>
                                    <span th:case="'To realize'">Do realizacji</span>
                                    <span th:case="'In progress'">W realizacji</span>
                                    <span th:case="'Canceled'">Anulowane</span>
                                    <span th:case="'Closed'">Zamknięto</span>
                                    <span th:case="*" th:text="${order.platonOrderStatus}"></span>
                                </span>
                            </span>
                        </div>
                    </td>
                    <td class="text-end fw-semibold"
                        th:text="${#numbers.formatDecimal(#aggregates.sum(order.products.![priceBrutto * quantity]), 1, 2)} + ' PLN'">
                    </td>
                    <td class="text-center">
                        <a th:href="@{'/admin/order/' + ${order.orderId}}" class="btn btn-sm btn-primary px-3">
                            <i class="bi bi-eye me-1"></i>Zobacz
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGINACJA -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center flex-wrap gap-1">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=${currentPage > 0 ? currentPage - 1 : 0}, size=${pageSize})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage == 0} ? 'active'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=0, size=${pageSize})}">1</a>
            </li>

            <li th:each="i : ${#numbers.sequence(1, totalPages - 2)}"
                th:if="${i >= currentPage - 3 and i <= currentPage + 3}"
                class="page-item"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/orders(pageNumber=${i}, size=${pageSize})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:if="${totalPages > 1}"
                th:classappend="${currentPage == totalPages - 1} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/orders(pageNumber=${totalPages - 1}, size=${pageSize})}"
                   th:text="${totalPages}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=${currentPage + 1 < totalPages ? currentPage + 1 : totalPages - 1}, size=${pageSize})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
