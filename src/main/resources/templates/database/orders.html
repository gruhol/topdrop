<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Zamówienia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</head>

<body>

<div class="container">
    <div class="row">
        <div class="col">
            <th:block th:insert="~{database/fragments/menu :: menu}"></th:block>
        </div>
    </div>

    <h1>Baza produktów</h1>
    <div class="row">
        <div class="col"><p>Liczba zamówień: <span th:text="${orders.totalElements}"></span></p></div>
        <div class="col">
            <form th:action="@{/search}">
                <input type="text" name="keywords" class="form-control form-control-solid" placeholder="Szukaj..." id="generalSearch">
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table">
            <tr>
                <td>Order ID</td>
                <td>Data</td>
                <td>Klient</td>
                <td>Wartość</td>
                <td></td>

            </tr>
            <tr th:each="order : ${orders.content}">
                <td th:text="${order.orderId}"></td>
                <td th:text="${order.dateAdd}"></td>
                <td>
                    <span th:text="${order.userLogin}"></span><br>
                    <span th:text="${order.phone}"></span><br>
                    <span th:text="${order.email}"></span>
                </td>
                <td th:text="${#numbers.formatDecimal(#aggregates.sum(order.products.![priceBrutto * quantity]), 1, 2)} + ' PLN'"></td>
                <td><a th:href="@{'/admin/order/' + ${order.orderId}}" type="button" class="btn btn-primary">Zobacz</a></td>
            </tr>
        </table>
    </div>

    <nav aria-label="Page navigation example" th:if="${totalPages > 1}">
        <ul class="pagination">

            <!-- Poprzednia -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=${currentPage - 1}, size=${pageSize})}">Poprzednia</a>
            </li>

            <!-- Pierwsza strona -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'active'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=0, size=${pageSize})}">1</a>
            </li>

            <!-- Trzy przed, bieżąca, trzy po -->
            <li th:each="i : ${#numbers.sequence(1, totalPages - 2)}"
                th:if="${i >= currentPage - 3 and i <= currentPage + 3}"
                class="page-item"
                th:classappend="${i} == ${currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/orders(pageNumber=${i}, size=${pageSize})}"
                   th:text="${i + 1}">1</a>
            </li>

            <!-- Ostatnia strona -->
            <li class="page-item" th:if="${totalPages > 1}"
                th:classappend="${currentPage == totalPages - 1} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/orders(pageNumber=${totalPages - 1}, size=${pageSize})}"
                   th:text="${totalPages}">999</a>
            </li>

            <!-- Następna -->
            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(pageNumber=${currentPage + 1}, size=${pageSize})}">Następna</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
